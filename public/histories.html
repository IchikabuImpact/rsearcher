<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakuten Point Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Point Dashboard</h1>
            <p>楽天ポイントの分析・履歴レポート</p>
            
            <div class="filter-group">
                <button class="filter-btn" data-days="7">直近7日</button>
                <button class="filter-btn active" data-days="30">直近30日</button>
                <button class="filter-btn" data-days="90">直近90日</button>
                <button class="filter-btn" data-days="all">全期間</button>
            </div>
        </header>

        <!-- Summary Cards -->
        <section class="summary-cards">
            <div class="card">
                <div class="card-title">獲得合計</div>
                <div class="card-value gain" id="sum-get">0 P</div>
            </div>
            <div class="card">
                <div class="card-title">利用合計</div>
                <div class="card-value loss" id="sum-use">0 P</div>
            </div>
            <div class="card">
                <div class="card-title">純増ポイント</div>
                <div class="card-value net" id="sum-net">0 P</div>
            </div>
            <div class="card">
                <div class="card-title">追加完了 (利息等)</div>
                <div class="card-value add" id="sum-add">0 P</div>
            </div>
            <div class="card">
                <div class="card-title">チャージ合計</div>
                <div class="card-value charge" id="sum-charge">0 円</div>
            </div>
            <div class="card p-rewarding">
                <div class="card-title">最大獲得サービス</div>
                <div class="card-value text-fit" id="top-service">-</div>
            </div>
        </section>

        <div class="grid-layout">
            <!-- Service Aggregation -->
            <section class="table-container fade-in">
                <h2>サービス別獲得集計</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>サービス</th>
                            <th class="txt-right">件数</th>
                            <th class="txt-right">合計PT</th>
                            <th class="txt-right">平均PT</th>
                        </tr>
                    </thead>
                    <tbody id="service-tbody"></tbody>
                </table>
            </section>

            <!-- Type Aggregation -->
            <section class="table-container fade-in">
                <h2>種別(Type)別集計</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>種別</th>
                            <th class="txt-right">件数</th>
                            <th class="txt-right">合計PT</th>
                        </tr>
                    </thead>
                    <tbody id="type-tbody"></tbody>
                </table>
            </section>
        </div>

        <!-- Daily Trend -->
        <section class="table-container fade-in">
            <h2>日別推移</h2>
            <div class="scroll-x">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>日付</th>
                            <th class="txt-right">獲得</th>
                            <th class="txt-right">利用</th>
                            <th class="txt-right">追加完了</th>
                            <th class="txt-right">チャージ</th>
                            <th class="txt-right">純増</th>
                        </tr>
                    </thead>
                    <tbody id="daily-tbody"></tbody>
                </table>
            </div>
        </section>

        <!-- Raw History -->
        <section class="table-container fade-in">
            <h2>ポイント履歴詳細 (降順)</h2>
            <div class="scroll-x">
                <table class="data-table history-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>日付</th>
                            <th class="txt-right">PT</th>
                            <th>種別</th>
                            <th>サービス</th>
                            <th>内容</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr><td colspan="6" class="txt-center text-muted h-100">読込中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="/js/histories.js"></script>
</body>
</html>
